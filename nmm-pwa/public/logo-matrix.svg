<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF41;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AEEF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .text { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 32px; filter: url(#glow); }
  </style>
  <rect width="100%" height="100%" fill="transparent" />
  <text x="50%" y="45%" text-anchor="middle" fill="url(#matrixGradient)" class="text">NOVÝ MATRIX</text>
  <text x="50%" y="85%" text-anchor="middle" fill="url(#matrixGradient)" class="text" style="font-size: 24px; letter-spacing: 4px;">MEDIA</text>
</svg>
